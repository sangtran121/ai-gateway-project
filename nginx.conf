server {
    listen 80;

    # 1. Bắt mọi request gửi đến
    location / {
        # 2. Hỏi ý kiến Security API trước
        auth_request /auth;
        
        # Nếu API báo lỗi 403, trả về thông báo tùy chỉnh
        error_page 403 = /403.html;

        # 3. Nếu an toàn (API trả về 200), chuyển request tới Backend
        proxy_pass http://backend:80;
    }

    # Cấu hình gọi sang Security API
    location = /auth {
        internal;
        proxy_pass http://security_api:5000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # Gửi URL gốc sang cho AI phân tích
        proxy_set_header X-Original-URI $request_uri; 
    }

    # Trang cảnh báo khi bị chặn
    location = /403.html {
        default_type text/html;
        return 403 "<h1 style='color:red'>403 Forbidden</h1><p>Gateway AI da chan yeu cau nay vi nghi ngo co chua ma doc SQL Injection.</p>";
    }
}