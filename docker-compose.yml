version: '3.8'

services:
  security_api:
    build: .
    ports:
      - "5000:5000"
    
  backend:
    # Đây là một ứng dụng web mô phỏng đơn giản
    image: nginxdemos/hello:plain-text 
    ports:
      - "8080:80"

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - security_api
      - backend