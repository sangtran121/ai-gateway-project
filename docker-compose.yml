version: '3.8'

services:
  # --- THÊM REDIS CACHE ---
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  security_api:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - redis # Đảm bảo Redis chạy trước API

  backend:
    # Đây là một ứng dụng web mô phỏng đơn giản
    image: nginxdemos/hello:plain-text 
    ports:
      - "8080:80"

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./captcha.html:/usr/share/nginx/html/captcha.html # Thêm dòng này
    depends_on:
      - security_api
      - backend